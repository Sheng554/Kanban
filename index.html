<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task Board - Dynamic Kanban</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>My Task Board</h1>
        <span id="taskCounter">0</span>
        <!--span like add a label easy for js to find and modify it-->
        <select id="priorityFilter">
            <option value="all">All Priorities</option>
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
        </select>
    </header>

    <main id="board">
    <section id="todo">
        <h2>To Do</h2>
        <ul></ul>
        <button class="add-task-btn">+ Add Task</button>
    </section>

    <section id="inprogress">
        <h2>In Progress</h2>
        <ul></ul>
        <button class="add-task-btn">+ Add Task</button>
    </section>

    <section id="done">
        <h2>Done</h2>
        <ul></ul>
        <button class="add-task-btn">+ Add Task</button>
        <button id="clearDoneBtn" class="clear-done-btn">🗑️ Clear All Done</button>
    </section>
    </main>

    <div id="taskModal">
        <!--style="display:none hide it, later use js to change to make it visible-->
        
        <div class="modal-content">
        <span class="close-modal">&times;</span>
        <h3>Task Details</h3>
        <input type="text" id="modalTitle" placeholder="Task Title">
        <textarea id="modalDesc" placeholder="Task Description"></textarea>
        <select id="modalPriority">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
        </select>
        <input type="date" id="modalDueDate">

        <div class="modal-buttons">
        <button id="saveTaskBtn">Save</button>
        <button id="cancelModalBtn">Cancel</button>
        </div>
    </div>
    </div>

    <script src="taskmanager.js"></script>
</body>
</html>
